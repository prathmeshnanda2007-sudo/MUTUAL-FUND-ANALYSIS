# ---------------------------------------------------------
# Bluestock MF Analytics — NGINX Reverse Proxy Config
# ---------------------------------------------------------
# Save this file to /etc/nginx/sites-available/mf-analytics
# and link it to /etc/nginx/sites-enabled/
#
# Remember to replace `example.com` with your actual domain.
# Let's Encrypt (Certbot) can automatically inject SSL configs here.
# ---------------------------------------------------------

# 1. Dashboard (Streamlit) Block
server {
    listen 80;
    server_name dashboard.example.com;

    # Streamlit routing
    location / {
        proxy_pass http://127.0.0.1:8501;
        
        # Standard Proxy Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (Crucial for Streamlit)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# 2. Authentication Gateway & API (FastAPI via Gunicorn) Block
server {
    listen 80;
    server_name auth.example.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
