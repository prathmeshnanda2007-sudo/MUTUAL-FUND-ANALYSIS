<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Bluestock MF Analytics</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="bg-mesh"></div>

    <nav class="navbar">
        <a href="/" class="nav-brand">Bluestock <span class="text-gradient">MF</span></a>
    </nav>

    <div class="container">
        <div class="glass-card">
            <h2 class="text-center mb-2">Welcome Back</h2>
            <p class="text-center text-muted mb-6" style="color: var(--text-muted); font-size: 0.875rem;">
                Sign in to your account
            </p>

            {% if error %}
            <div class="alert alert-error">
                <span style="margin-right:8px;">⚠️</span> {{ error }}
            </div>
            {% endif %}

            {% if success_msg %}
            <div class="alert alert-success">
                <span style="margin-right:8px;">✅</span> {{ success_msg }}
            </div>
            {% endif %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input id="email" name="email" type="email" required class="form-input" placeholder="you@example.com">
                </div>

                <div class="form-group mb-6">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label for="password" class="form-label mb-0">Password</label>
                        <a href="/forgot-password" class="link" style="font-size: 0.75rem;">Forgot password?</a>
                    </div>
                    <input id="password" name="password" type="password" required class="form-input mt-2" placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="divider">or continue with</div>

            <a href="/auth/google" class="btn btn-google">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                Google
            </a>

            <p class="text-center mt-6" style="font-size: 0.875rem;">
                Don't have an account? <a href="/register" class="link">Create one</a>
            </p>
        </div>
    </div>
</body>
</html>
