<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Bluestock MF Analytics</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="bg-mesh"></div>

    <nav class="navbar">
        <a href="/" class="nav-brand">Bluestock <span class="text-gradient">MF</span></a>
    </nav>

    <div class="container" style="padding: 1rem;">
        <div class="glass-card" style="max-width: 500px; padding: 2rem;">
            <h2 class="text-center mb-2">Set New Password</h2>
            <p class="text-center text-muted mb-6" style="color: var(--text-muted); font-size: 0.875rem;">
                Please enter your new strong password below.
            </p>

            {% if error %}
            <div class="alert alert-error">
                <span style="margin-right:8px;">⚠️</span> {{ error }}
            </div>
            {% endif %}

            <form action="/reset-password" method="POST" id="resetForm">
                <input type="hidden" name="token" value="{{ token }}">
                
                <div class="form-group mb-4">
                    <label for="password" class="form-label">New Password</label>
                    <input id="password" name="password" type="password" required class="form-input" placeholder="••••••••">
                    
                    <div class="validation-rules" id="password-rules">
                        <p id="rule-length"><span class="icon">⭕</span> 8-64 characters</p>
                        <p id="rule-upper"><span class="icon">⭕</span> At least 1 uppercase letter</p>
                        <p id="rule-lower"><span class="icon">⭕</span> At least 1 lowercase letter</p>
                        <p id="rule-number"><span class="icon">⭕</span> At least 1 number</p>
                        <p id="rule-special"><span class="icon">⭕</span> At least 1 special character</p>
                        <p id="rule-nospace"><span class="icon">⭕</span> No spaces allowed</p>
                    </div>
                </div>

                <div class="form-group mb-6">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input id="confirm_password" name="confirm_password" type="password" required class="form-input" placeholder="••••••••">
                    <p id="rule-match" style="color: var(--danger-color); font-size: 0.75rem; margin-top: 0.25rem; display: none;">Passwords do not match</p>
                </div>

                <button type="submit" id="submitBtn" disabled class="btn btn-primary">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        const password = document.getElementById('password');
        const confirm_password = document.getElementById('confirm_password');
        const submitBtn = document.getElementById('submitBtn');
        const matchError = document.getElementById('rule-match');

        const rules = {
            length: { element: document.getElementById('rule-length'), test: v => v.length >= 8 && v.length <= 64 },
            upper: { element: document.getElementById('rule-upper'), test: v => /[A-Z]/.test(v) },
            lower: { element: document.getElementById('rule-lower'), test: v => /[a-z]/.test(v) },
            number: { element: document.getElementById('rule-number'), test: v => /[0-9]/.test(v) },
            special: { element: document.getElementById('rule-special'), test: v => /[!@#$%^&*()_\+\-=\[\]{}|;:'",.<>\/?]/.test(v) },
            nospace: { element: document.getElementById('rule-nospace'), test: v => !/\s/.test(v) && v.length > 0 }
        };

        function validatePassword() {
            const val = password.value;
            let allValid = true;

            for (const key in rules) {
                const rule = rules[key];
                const isValid = rule.test(val);
                if (isValid) {
                    rule.element.innerHTML = '<span class="icon" style="color: var(--success-color);">✔️</span> ' + rule.element.innerText.substring(2);
                    rule.element.className = 'rule-valid';
                } else {
                    rule.element.innerHTML = '<span class="icon">⭕</span> ' + rule.element.innerText.substring(2);
                    rule.element.className = 'rule-invalid';
                    allValid = false;
                }
            }

            const match = val === confirm_password.value && val !== '';
            if (confirm_password.value !== '') {
                matchError.style.display = match ? 'none' : 'block';
            } else {
                matchError.style.display = 'none';
            }

            submitBtn.disabled = !(allValid && match);
        }

        password.addEventListener('input', validatePassword);
        confirm_password.addEventListener('input', validatePassword);
    </script>
</body>
</html>
