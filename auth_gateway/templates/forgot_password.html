<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Bluestock MF Analytics</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="bg-mesh"></div>

    <nav class="navbar">
        <a href="/" class="nav-brand">Bluestock <span class="text-gradient">MF</span></a>
    </nav>

    <div class="container">
        <div class="glass-card">
            <h2 class="text-center mb-2">Reset Password</h2>
            <p class="text-center text-muted mb-6" style="color: var(--text-muted); font-size: 0.875rem;">
                Enter your email address and we'll send you a link to reset your password.
            </p>

            {% if error %}
            <div class="alert alert-error">
                <span style="margin-right:8px;">⚠️</span> {{ error }}
            </div>
            {% endif %}

            {% if msg %}
            <div class="alert alert-success">
                <span style="margin-right:8px;">✅</span> {{ msg }}
            </div>
            {% endif %}

            <form action="/forgot-password" method="POST">
                <div class="form-group mb-6">
                    <label for="email" class="form-label">Email Address</label>
                    <input id="email" name="email" type="email" required class="form-input" placeholder="you@example.com">
                </div>

                <button type="submit" class="btn btn-primary">Send Reset Link</button>
            </form>
            
            <p class="text-center mt-6" style="font-size: 0.875rem;">
                <a href="/login" class="link">Back to login</a>
            </p>
        </div>
    </div>
</body>
</html>
